{% extends "base.html" %}

{% block content %}
<section class="create-deck">
    <h2>Create New Deck</h2>
    <form action="{{ url_for('create_deck') }}" method="POST">
        <input type="text" name="name" placeholder="Deck Name (e.g., Spanish Vocab)" required>
        <button type="submit" class="btn primary">Create Deck</button>
    </form>
</section>

<section class="deck-list">
    <h2>Your Decks</h2>
    {% if decks %}
        <div class="grid">
            {% for deck in decks %}
                <a href="{{ url_for('view_deck', deck_id=deck['id']) }}" class="card deck-card">
                    <h3>{{ deck['name'] }}</h3>
                    <p>View Cards & Study →</p>
                </a>
            {% endfor %}
        </div>
    {% else %}
        <p class="empty-state">No decks yet. Create one to get started!</p>
    {% endif %}
</section>
{% endblock %}
