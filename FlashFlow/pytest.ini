[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Flask app module
flask_app = app:app

# Coverage configuration
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=75

markers =
    auth: Authentication tests
    cards: Card management tests
    decks: Deck management tests
    units: Unit/topic tests
    classes: Class management tests
    importexport: Import/Export tests
    study: Study functionality tests
    slow: Slow tests
