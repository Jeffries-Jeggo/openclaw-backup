{% extends "base.html" %}

{% block title %}Create Class{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Create New Class</h2>
    
    <form method="POST" action="{{ url_for('create_class') }}" class="auth-form">
        <div class="form-group">
            <label for="name">Class Name</label>
            <input type="text" id="name" name="name" required placeholder="e.g., Biology 101, Year 7 Maths">
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('list_classes') }}" class="btn secondary">Cancel</a>
            <button type="submit" class="btn primary">Create Class</button>
        </div>
    </form>
    
    <p class="hint">A unique 6-character class code will be generated automatically.</p>
</div>
{% endblock %}
