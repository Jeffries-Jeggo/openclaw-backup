<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashFlow Synthwave Demo</title>
    <style>
        :root {
            /* Classic Vaporwave (Default) */
            --bg-dark: #0f0f23;
            --bg-card: #1a1a2e;
            --text-primary: #e0e0ff;
            --accent-neon: #ff00ff;
            --glow: #aa00aa;
            --success: #00ff88;
            --error: #ff4757;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .palette-selector {
            padding: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--accent-neon);
            border-radius: 4px;
        }

        .deck {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 10px var(--glow);
            cursor: pointer;
            transition: transform 0.6s, box-shadow 0.3s;
            transform-style: preserve-3d;
            position: relative;
            height: 150px;
        }

        .card:hover {
            box-shadow: 0 0 20px var(--accent-neon);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            backface-visibility: hidden;
            position: absolute;
            width: calc(100% - 40px);
            height: calc(100% - 40px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .status {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 10px;
        }

        .status.new {
            background: var(--success);
            color: var(--bg-dark);
        }

        .status.due {
            background: var(--error);
            color: white;
        }

        @media (max-width: 768px) {
            .deck {
                grid-template-columns: 1fr;
            }
            .card {
                height: 120px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>FlashFlow Deck</h1>
        <select class="palette-selector" id="paletteSelector">
            <option value="1">Classic Vaporwave</option>
            <option value="2">Cyberpunk Cyan</option>
            <option value="3">Neon Violet</option>
            <option value="4">Hot Pink/Teal</option>
            <option value="5">Azure Lime</option>
        </select>
    </div>

    <div class="deck" id="cardDeck">
        <!-- Cards will be generated by JavaScript -->
    </div>

    <script>
        // Palettes data
        const palettes = {
            1: { // Classic Vaporwave
                '--bg-dark': '#0f0f23',
                '--bg-card': '#1a1a2e',
                '--text-primary': '#e0e0ff',
                '--accent-neon': '#ff00ff',
                '--glow': '#aa00aa',
                '--success': '#00ff88',
                '--error': '#ff4757'
            },
            2: { // Cyberpunk Cyan
                '--bg-dark': '#000011',
                '--bg-card': '#0a1428',
                '--text-primary': '#b0d4ff',
                '--accent-neon': '#00ffff',
                '--glow': '#0088cc',
                '--success': '#00ff41',
                '--error': '#ff3333'
            },
            3: { // Neon Violet
                '--bg-dark': '#12001a',
                '--bg-card': '#200030',
                '--text-primary': '#d0b8ff',
                '--accent-neon': '#aa00ff',
                '--glow': '#6600aa',
                '--success': '#44ff44',
                '--error': '#ff6666'
            },
            4: { // Hot Pink/Teal
                '--bg-dark': '#0a0015',
                '--bg-card': '#1a0030',
                '--text-primary': '#ffd4ff',
                '--accent-neon': '#ff1493',
                '--glow': '#cc0f7a',
                '--success': '#20ffaa',
                '--error': '#ff4444'
            },
            5: { // Azure Lime
                '--bg-dark': '#001122',
                '--bg-card': '#002244',
                '--text-primary': '#a0e8ff',
                '--accent-neon': '#00ff88',
                '--glow': '#00cc66',
                '--success': '#88ff88',
                '--error': '#ff8888'
            }
        };

        // Card data
        const cards = [
            { front: 'Hello', back: '你好', status: 'new' },
            { front: 'Goodbye', back: '再见', status: 'new' },
            { front: 'Thank you', back: '谢谢', status: 'due' },
            { front: 'Please', back: '请', status: 'new' },
            { front: 'Yes', back: '是', status: 'due' },
            { front: 'No', back: '不是', status: 'new' },
            { front: 'Good morning', back: '早上好', status: 'due' },
            { front: 'Good night', back: '晚安', status: 'new' }
        ];

        // Initialize the deck
        function initDeck() {
            const deck = document.getElementById('cardDeck');
            deck.innerHTML = '';

            cards.forEach(card => {
                const cardElement = document.createElement('div');
                cardElement.className = 'card';
                cardElement.innerHTML = `
                    <div class="card-front">
                        <span class="status ${card.status}">${card.status}</span>
                        <h2>${card.front}</h2>
                    </div>
                    <div class="card-back">
                        <h2>${card.back}</h2>
                    </div>
                `;

                cardElement.addEventListener('click', function() {
                    this.classList.toggle('flipped');
                });

                deck.appendChild(cardElement);
            });
        }

        // Change palette
        document.getElementById('paletteSelector').addEventListener('change', function() {
            const palette = palettes[this.value];
            for (const [key, value] of Object.entries(palette)) {
                document.documentElement.style.setProperty(key, value);
            }
        });

        // Initialize on load
        window.addEventListener('DOMContentLoaded', initDeck);
    </script>
</body>
</html>
